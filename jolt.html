<body>
    <div class="code">
        <div class="editor-header">
            <div class="lang-badge">
                <i class="fab fa-js-square"></i> JavaScript
            </div>
        </div>

        <div class="editor-wrap">
            <textarea
                id="code"
                class="editor-textarea"
                spellcheck="false"
                autocorrect="off"
                autocapitalize="off"
                placeholder="Write your JavaScript code here...&#10;&#10;Try running something like:&#10;const res = await fetch('https://blaze-server-x75p.onrender.com/api/users');&#10;const data = await res.json();&#10;console.log(data);"
            ></textarea>

            <div class="editor-highlight" aria-hidden="true"><pre class="language-js"><code id="highlight-code" class="language-js"></code></pre></div>
        </div>

        <div class="actions-bar">
            <button id="run">
                <i class="fa fa-play"></i>
                <span id="run-txt">Run Code</span>
            </button>
            <button id="copy-output">
                <i class="fa fa-regular fa-copy"></i>
                <span id="copy-txt">Copy Output</span>
            </button>
            <button id="share-page">
                <i class="fa-solid fa-share-nodes"></i>
                <span id="share-txt">Share Page</span>
            </button>
        </div>

        <div class="console-container">
            <div id="console" class="console">Code Output here...</div>
        </div>
    </div>

    <div id="consent-toast" class="toast-gateway">
        <div class="toast-header">
            <div class="toast-title">
                <i class="fa-solid fa-triangle-exclamation"></i> Auto-Run Triggered
            </div>
            <div class="toast-close" id="toast-close"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div class="toast-body">
            This URL request contains pre-loaded code that wants to execute instantly. Do you trust this script?
        </div>
        <div class="toast-actions">
            <button class="toast-btn toast-btn-ignore" id="toast-ignore"><i class="fa-solid fa-ban"></i>  Ignore</button>
            <button class="toast-btn toast-btn-run" id="toast-run"><i class="fa-solid fa-play"></i> Run Code</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <script>
        const codeInput = document.getElementById('code');
        const highlightCode = document.getElementById('highlight-code');
        const highlightDiv = document.querySelector('.editor-highlight');
        const runBtn = document.getElementById('run');
        const copyBtn = document.getElementById('copy-output');
        const shareBtn = document.getElementById('share-page');
        const consoleScreen = document.getElementById('console');
        const runTxt = document.getElementById('run-txt');

        // Gateway Elements
        const consentToast = document.getElementById('consent-toast');
        const toastRun = document.getElementById('toast-run');
        const toastIgnore = document.getElementById('toast-ignore');
        const toastClose = document.getElementById('toast-close');

        // ── Real-time syntax highlighting ──────────────────────────────
        function syncHighlight() {
            let src = codeInput.value;
            if (src.endsWith('\n') || src === '') src += ' ';
            highlightCode.innerHTML = Prism.highlight(
                src, Prism.languages.javascript, 'javascript'
            );
        }

        function syncScroll() {
            highlightDiv.scrollTop  = codeInput.scrollTop;
            highlightDiv.scrollLeft = codeInput.scrollLeft;
        }

        codeInput.addEventListener('input',  syncHighlight);
        codeInput.addEventListener('scroll', syncScroll);


        // ── Run Logic Handler Function ─────────────────────────────────
        async function executeCode() {
            runTxt.textContent = 'Running…';
            consoleScreen.innerHTML = '';
            const outputStart = consoleOutputCount;

            try {
                const src = codeInput.value;
                if (!src.trim()) { console.warn('The editor is empty. Write some code first!'); return; }
                const result = await new Function(`return (async () => { ${src} })()`)();
                if (consoleOutputCount === outputStart) {
                    appendLog(processArgs([result]), 'log');
                }
            } catch (err) {
                console.error(err);
            } finally {
                runTxt.textContent = 'Run Code';
            }
        }

        // ── URL Query Parameter Code Loader (With Base64 Fallback) ─────
        const urlParams = new URLSearchParams(window.location.search);
        const codeParam = urlParams.get('code');
        const autoRunParam = urlParams.get('run');

        if (codeParam !== null) {
            try {
                codeInput.value = atob(codeParam);
            } catch (e) {
                codeInput.value = codeParam;
            }
            codeInput.selectionStart = codeInput.selectionEnd = codeInput.value.length;

            // Trigger gateway toast notification if run=true parameter exists
            if (autoRunParam === 'true') {
                setTimeout(() => {
                    consentToast.classList.add('show');
                }, 400);
            }
        }

        syncHighlight();
        syncScroll();

        // ── Tab → 2 spaces ─────────────────────────────────────────────
        codeInput.addEventListener('keydown', e => {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            const s = codeInput.selectionStart, end = codeInput.selectionEnd;
            codeInput.value = codeInput.value.slice(0, s) + '  ' + codeInput.value.slice(end);
            codeInput.selectionStart = codeInput.selectionEnd = s + 2;
            syncHighlight();
            syncScroll();
        });

        // ── Global Persistent Console intercept ────────────────────────
        const _log = console.log.bind(console);
        const _warn = console.warn.bind(console);
        const _error = console.error.bind(console);
        let consoleOutputCount = 0;


        function processArgs(args) {
            return args.map(arg => {
                if (arg instanceof Error) {
                    return { type: 'text', content: arg.stack || `${arg.name}: ${arg.message}` };
                }
                if (arg !== null && typeof arg === 'object') {
                    try {
                        const inspected = inspectObject(arg);
                        const html = Prism.highlight(inspected, Prism.languages.json, 'json');
                        return { type: 'html', content: `<pre class="language-json"><code class="language-json">${html}</code></pre>` };
                    } catch { return { type: 'text', content: String(arg) }; }
                }
                return { type: 'text', content: String(arg) };
            });
        }

        function safeAccess(obj, key) {
            try {
                return obj[key];
            } catch (err) {
                return `[Throws: ${err.message}]`;
            }
        }

        function safeCall(obj, method, ...args) {
            try {
                return typeof obj[method] === 'function' ? obj[method](...args) : undefined;
            } catch (err) {
                return `[Throws: ${err.message}]`;
            }
        }

        function isPluginArray(obj) {
            return obj && typeof obj === 'object' && typeof obj.length === 'number' && typeof obj.item === 'function' && typeof obj.namedItem === 'function' &&
                (obj.constructor?.name === 'PluginArray' || Object.prototype.toString.call(obj) === '[object PluginArray]');
        }

        function isMimeTypeArray(obj) {
            return obj && typeof obj === 'object' && typeof obj.length === 'number' && typeof obj.item === 'function' && typeof obj.namedItem === 'function' &&
                (obj.constructor?.name === 'MimeTypeArray' || Object.prototype.toString.call(obj) === '[object MimeTypeArray]');
        }

        function inspectPluginArray(obj, depth, seen) {
            const length = Number(safeAccess(obj, 'length')) || 0;
            const items = [];
            for (let i = 0; i < length; i++) {
                const plugin = safeAccess(obj, i) ?? safeCall(obj, 'item', i);
                items.push(inspectPlugin(plugin, depth + 1, seen));
            }
            return `{
  "length": ${length},
  "plugins": [
    ${items.join(',\n    ')}
  ]
}`;
        }

        function inspectMimeTypeArray(obj, depth, seen) {
            const length = Number(safeAccess(obj, 'length')) || 0;
            const items = [];
            for (let i = 0; i < length; i++) {
                const mime = safeAccess(obj, i) ?? safeCall(obj, 'item', i);
                items.push(inspectMimeType(mime, depth + 1, seen));
            }
            return `{
  "length": ${length},
  "mimeTypes": [
    ${items.join(',\n    ')}
  ]
}`;
        }

        function inspectPlugin(plugin, depth, seen) {
            if (!plugin || typeof plugin !== 'object') return inspectObject(plugin, depth, seen);
            const name = safeAccess(plugin, 'name');
            const filename = safeAccess(plugin, 'filename');
            const description = safeAccess(plugin, 'description');
            return `{
      "name": ${inspectObject(name, depth + 1, seen)},
      "filename": ${inspectObject(filename, depth + 1, seen)},
      "description": ${inspectObject(description, depth + 1, seen)}
    }`;
        }

        function inspectMimeType(mime, depth, seen) {
            if (!mime || typeof mime !== 'object') return inspectObject(mime, depth, seen);
            const type = safeAccess(mime, 'type');
            const description = safeAccess(mime, 'description');
            const suffixes = safeAccess(mime, 'suffixes');
            const enabledPlugin = safeAccess(mime, 'enabledPlugin');
            const enabledPluginName = enabledPlugin && typeof enabledPlugin === 'object' ? safeAccess(enabledPlugin, 'name') : enabledPlugin;
            return `{
      "type": ${inspectObject(type, depth + 1, seen)},
      "description": ${inspectObject(description, depth + 1, seen)},
      "suffixes": ${inspectObject(suffixes, depth + 1, seen)},
      "enabledPlugin": ${inspectObject(enabledPluginName || '[Plugin]', depth + 1, seen)}
    }`;
        }

        function inspectObject(obj, depth = 0, seen = new WeakSet()) {
            if (obj === null) return 'null';
            if (typeof obj === 'undefined') return 'undefined';
            if (typeof obj === 'string') return JSON.stringify(obj);
            if (typeof obj === 'symbol') return obj.toString();
            if (typeof obj === 'number' || typeof obj === 'boolean' || typeof obj === 'bigint') return String(obj);
            if (typeof obj === 'function') return '[Function]';
            if (obj instanceof Date) return JSON.stringify(obj.toString());
            if (obj instanceof RegExp) return JSON.stringify(obj.toString());
            if (obj instanceof Error) return JSON.stringify({ name: obj.name, message: obj.message }, null, 2);

            if (seen.has(obj)) return '[Circular]';
            seen.add(obj);

            if (isPluginArray(obj)) {
                return inspectPluginArray(obj, depth, seen);
            }

            if (isMimeTypeArray(obj)) {
                return inspectMimeTypeArray(obj, depth, seen);
            }

            if (Array.isArray(obj)) {
                const items = obj.map(item => inspectObject(item, depth + 1, seen));
                return `[
  ${items.join(',\n  ')}
]`;
            }

            const json = (() => {
                try { return JSON.stringify(obj, null, 2); } catch { return null; }
            })();
            if (json && json !== '{}' && json !== 'null') return json;

            const propNames = new Set(Object.getOwnPropertyNames(obj));
            const proto = Object.getPrototypeOf(obj);
            if (proto && proto !== Object.prototype && proto !== null) {
                Object.getOwnPropertyNames(proto).forEach(name => propNames.add(name));
            }

            const props = [...propNames].filter(name => name !== 'constructor' && name !== '__proto__');
            const lines = props.map(name => {
                let value;
                try { value = obj[name]; } catch (err) { value = `[Throws: ${err.message}]`; }
                return `"${name}": ${inspectObject(value, depth + 1, seen)}`;
            });

            return `{
  ${lines.join(',\n  ')}
}`;
        }

        function appendLog(items, level) {
            if (consoleScreen.textContent === 'Code Output here...') {
                consoleScreen.innerHTML = '';
            }

            const line = document.createElement('div');
            if (level === 'error') line.className = 'log-error';
            if (level === 'warn') line.className = 'log-warn';

            items.forEach((item, i) => {
                const span = document.createElement('span');
                if (item.type === 'html') span.innerHTML = item.content;
                else span.textContent = item.content;
                line.appendChild(span);
                if (i < items.length - 1) line.appendChild(document.createTextNode(' '));
            });
            consoleScreen.appendChild(line);
            consoleScreen.scrollTop = consoleScreen.scrollHeight;
            consoleOutputCount += 1;
        }

        console.log = (...a) => { _log(...a); appendLog(processArgs(a), 'log'); };
        console.warn = (...a) => { _warn(...a); appendLog(processArgs(a), 'warn'); };
        console.error = (...a) => { _error(...a); appendLog(processArgs(a), 'error'); };

        // Manual Execution Button Hook
        runBtn.addEventListener('click', executeCode);

        // ── Gateway Toast Interaction Controllers ──────────────────────
        function closeToast() {
            consentToast.classList.remove('show');
        }

        toastRun.addEventListener('click', () => {
            closeToast();
            executeCode();
        });

        toastIgnore.addEventListener('click', closeToast);
        toastClose.addEventListener('click', closeToast);

        // ── Clipboard Copy Feature implementation ──────────────────────
        copyBtn.addEventListener('click', async () => {
            const textToCopy = consoleScreen.innerText;
            if (textToCopy === 'Code Output here...') return;
            try {
                await navigator.clipboard.writeText(textToCopy);
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = `<i class="fa fa-solid fa-check"></i> <span id="copy-txt">Copied!</span>`;
                setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
            } catch (error) {
                _error('Failed to copy text into clipboard container:', error);
            }
        });

        // ── Web Share API Implementation ──────────────────────────────
        shareBtn.addEventListener('click', async () => {
            const currentCode = codeInput.value;
            const shareUrl = new URL(window.location.href);

            const encodedCode = btoa(String.fromCharCode(...new TextEncoder().encode(currentCode)));
            shareUrl.searchParams.set('code', encodedCode);
            // Optional: You can append &run=true to generated links manually if desired

            const shareData = {
                title: 'Jolt Code Snippet',
                text: 'Check out this JavaScript code snippet on Jolt!',
                url: shareUrl.toString()
            };

            if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                try {
                    await navigator.share(shareData);
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        _error('Web Share failed:', error);
                    }
                }
            } else {
                try {
                    await navigator.clipboard.writeText(shareUrl.toString());
                    const originalHtml = shareBtn.innerHTML;
                    shareBtn.innerHTML = `<i class="fa-solid fa-link"></i> <span id="share-txt">Link Copied!</span>`;
                    setTimeout(() => { shareBtn.innerHTML = originalHtml; }, 2000);
                } catch (clipError) {
                    _error('Fallback copy link generation error:', clipError);
                }
            }
        });
    </script>
